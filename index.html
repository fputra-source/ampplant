<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AMP Plant App</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#2ecc71">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
   <iframe src="https://script.google.com/macros/s/AKfycb.../exec" allow="geolocation; camera" style="width:100%; height:100%; border:none;"></iframe>

    <script>
        // Mendaftarkan Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('SW terdaftar!', reg))
                    .catch(err => console.error('SW gagal terdaftar!', err));
            });
        }
    </script>
</body>
</html>
